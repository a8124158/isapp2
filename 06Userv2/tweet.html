<!DOCTYPE html>

<html>

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <script type="text/javascript" src="../lib/jquery.min.js"></script>
    <script type="text/javascript" src="../lib/osql.js"></script>

    <script>
        osql.requireLogin();//すべてのページに入れる．google認証をして，osql.connect()や，osql.getMe()を使えるようにしてくれる．

        var x;

        $().ready(function () {
            name();
            x = 0;
            setInterval(doCount, 1000);
            doSelect();
        });

        async function name() {
            var username = osql.getParam('username');
            document.getElementById('tf1').value = username;

            var html = '<a href="followlist.html?username=' + username + '">フォローリスト</a>';
            document.getElementById('followlist').innerHTML = html;
        }

        async function doCount() {
            x++;
            if (x == 2) {
                doSelect();
                x = 0;
            }
        }

        async function doSelect() {
            var sql = 'select * from Tweets order by time desc limit 20';
            var objects = await osql.connect(sql);
            console.log(objects);
            var html = '';
            html = html + '<ul>';
            for (var i = 0; i < objects.length; i++) {
                var object = objects[i];
                html = html + '<li>' + object.name + ',' + object.tweet + ',' + object.time + '</li>';
            }
            html = html + '</ul>';
            document.getElementById('result').innerHTML = html;
        }

        async function doInsert() {
            var userid = document.getElementById('tf1').value;
            var tweet = document.getElementById('tf2').value;

            var sql = `insert into Tweets (name, tweet, time) values("${userid}", "${tweet}", now());`;
            var objects = await osql.connect(sql);
            console.log(objects);

            document.getElementById('result').innerHTML = "tweetしました";

            document.getElementById('tf1').value = '';
            document.getElementById('tf2').value = '';

            doSelect();
        }

        async function Follow() {
            var fromid = osql.getParam('username');
            var toid = document.getElementById('tf3').value;
            var sql = `insert into Follows (fromid, toid) values("${fromid}", "${toid}");`;
            var objects = await osql.connect(sql);
            console.log(objects);

            document.getElementById('follow').innerHTML = toid + "をフォローしました";

            document.getElementById('tf3').value = '';

            doSelect();
        }
    </script>

</head>

<body>
    <h1>Tweets</h1>
    名前:<input id="tf1" value="" type="textfield">
    <br>
    tweet:<input id="tf2" type="textfield">
    <button onclick="doInsert()">tweet</button><br>
    <input id="tf3" type="textfield">
    <button onclick="Follow()">Follow</button>
    <p id = "followlist"></p>
    <p id = "follow"></p>
    <hr>
    <p id="result">xxxx</p>
</body>

</html>
